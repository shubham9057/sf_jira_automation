name: Snowflake Access Provisioning - Jira Dispatch

on:
  repository_dispatch:
    types: [jira-approval]

jobs:
  snowflake-provisioning:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install snowflake-connector-python cryptography

      - name: Execute Snowflake Provisioning
        env:
          # Snowflake Connection Credentials - Select based on account
          SNOWFLAKE_ACCOUNT: ${{ github.event.client_payload.account == 'Partner Account' && secrets.SNOWFLAKE_PARTNER_ACCOUNT || github.event.client_payload.account == 'Oculus Account' && secrets.SNOWFLAKE_OCULUS_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
          # Metadata from Jira Payload
          USER_EMAIL: ${{ github.event.client_payload.email }}
          ROLE_NAME: ${{ github.event.client_payload.role || 'analyst' }}
          ACCOUNT_NAME: ${{ github.event.client_payload.account }}
        run: python .github/scripts/provision_snowflake.py

      - name: Update Jira Ticket - Success
        if: success()
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER: ${{ secrets.JIRA_USER_EMAIL }}
          TICKET_ID: ${{ github.event.client_payload.ticket_id }}
        run: |
          JIRA_AUTH=$(echo -n "$JIRA_USER:$JIRA_TOKEN" | base64 -w 0)
          
          # Post success comment with proper ADF format using jq
          COMMENT_BODY=$(jq -n '{body: {type: "doc", version: 1, content: [{type: "paragraph", content: [{type: "text", text: "Provisioning Complete: Snowflake user and role access granted via GitHub Actions."}]}]}}')
          curl "https://ssfintech76.atlassian.net/rest/api/3/issue/$TICKET_ID/comment" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic $JIRA_AUTH" \
            -d "$COMMENT_BODY" \
            -w "\nHTTP Status: %{http_code}\n" \
            -v
          
          # Transition to Done (ID 31 - update if different)
          curl "https://ssfintech76.atlassian.net/rest/api/3/issue/$TICKET_ID/transitions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic $JIRA_AUTH" \
            -d '{"transition": {"id": "761"}}' \
            -v

      - name: Update Jira Ticket - Failure
        if: failure()
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER: ${{ secrets.JIRA_USER_EMAIL }}
          TICKET_ID: ${{ github.event.client_payload.ticket_id }}
        run: |
          JIRA_AUTH=$(echo -n "$JIRA_USER:$JIRA_TOKEN" | base64 -w 0)
          
          # Post failure comment with proper ADF format using jq
          COMMENT_BODY=$(jq -n '{body: {type: "doc", version: 1, content: [{type: "paragraph", content: [{type: "text", text: "ERROR: Snowflake provisioning failed. Please check GitHub Action logs for technical details."}]}]}}')
          curl "https://ssfintech76.atlassian.net/rest/api/3/issue/$TICKET_ID/comment" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic $JIRA_AUTH" \
            -d "$COMMENT_BODY" \
            -w "\nHTTP Status: %{http_code}\n" \
            -v
          
          # Transition to In Progress/Reopened (ID 10 - update if different for your failure state)
          curl "https://ssfintech76.atlassian.net/rest/api/3/issue/$TICKET_ID/transitions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic $JIRA_AUTH" \
            -d '{"transition": {"id": "961"}}' \
            -v
