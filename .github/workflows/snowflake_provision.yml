name: Snowflake Access Provisioning

on:
  repository_dispatch:
    types: [jira-approval]
  workflow_dispatch:

jobs:
  snowflake-provisioning:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install snowflake-connector-python cryptography

      - name: Execute Snowflake Provisioning
        env:
          # Snowflake Connection Credentials
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          # Metadata from Jira Payload (hardcoded for testing)
          USER_EMAIL: john.booth@example.com
          ROLE_NAME: analyst
        run: python .github/scripts/provision_snowflake.py

